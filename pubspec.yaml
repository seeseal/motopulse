name: motopulse
description: MotoPulse - Advanced Rider Safety & Tracking App

publish_to: 'none'

version: 1.3.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Maps & Location
  google_maps_flutter: ^2.5.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Firebase (real-time group rides)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # UI
  flutter_svg: ^2.0.9

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # Storage
  shared_preferences: ^2.2.2

  # Networking
  http: ^1.2.0

  # SOS calling & SMS
  url_launcher: ^6.2.5

  # Profile photo
  image_picker: ^1.0.7

  # Background GPS foreground service
  flutter_foreground_task: ^8.0.1

  # Crash detection (accelerometer / gyroscope)
  sensors_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
